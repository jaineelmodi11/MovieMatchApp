# MovieMatch full stack — Postgres + Flask ML service + Express API
# Quick start:
#   git submodule update --init        # fetch the fine-tuned model
#   cp .env.example .env               # then fill in TMDB_API_KEY + AI_SERVICE_KEY
#   docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: movieswipe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movieswipe"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml:
    build:
      context: .
      dockerfile: movie-backend/Dockerfile.ml
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_DATABASE: movieswipe
      PG_USER: postgres
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      TMDB_API_KEY: ${TMDB_API_KEY}
      AI_SERVICE_KEY: ${AI_SERVICE_KEY}
      AI_SERVICE_BASE: http://ml:5000
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:5000"

  api:
    build:
      context: ./movie-backend
      dockerfile: Dockerfile
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_DATABASE: movieswipe
      PG_USER: postgres
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      TMDB_API_KEY: ${TMDB_API_KEY}
      AI_SERVICE_KEY: ${AI_SERVICE_KEY}
      AI_SERVICE_BASE: http://ml:5000
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata:
