name: moviematch
description: MovieMatch — cross-platform (iOS + Android) swipe-to-discover movie recommender, powered by the MovieMatch ML backend.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  cached_network_image: ^3.3.1
  flutter_card_swiper: ^7.0.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
